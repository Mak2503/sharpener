<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veg Shop</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f0f8ff;
        color: #333;
      }
      div.container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        background: #ffffff;
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
        border-radius: 4px;
      }
      label {
        display: inline-block;
        width: 80px;
      }
      input[type="text"],
      input[type="number"] {
        padding: 4px;
        margin-bottom: 10px;
        width: calc(100% - 90px);
        border: 1px solid #ccc;
        border-radius: 2px;
      }
      button {
        padding: 6px 12px;
        margin-left: 5px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 3px;
      }
      button:hover {
        background-color: #218838;
      }
      button.deleteButton {
        background-color: #dc3545;
      }
      button.deleteButton:hover {
        background-color: #c82333;
      }
      #shopList > div {
        border-bottom: 1px solid #ddd;
        padding: 8px 0;
        align-items: center;
        background: #fefefe;
      }
      #shopList p {
        margin: 0;
        min-width: 60px;
      }
      #shopList input.buy {
        width: 60px;
      }
      #shopList button {
        font-size: 0.9em;
      }
      .total {
        text-align: right;
        font-weight: bold;
        margin-top: 10px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div>
      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Ex, Tomato" />
      <label for="price">Price:</label>
      <input type="number" id="price" placeholder="Enter price" />
      <label for="quantity">Quantity:</label>
      <input type="number" id="quantity" placeholder="Enter quantity" />
      <button id="addToShop">Add to Shop</button>
    </div>
    <div id="shopList">
    </div>
    <div id="total">Total: 1</div>
    
  </body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.5.1/axios.min.js"></script>
  <script src="index.js"></script>
</html>
